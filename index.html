<style>
  *{box-sizing:border-box;margin:0;padding:0}

  .obtn{border:none;border-radius:14px;padding:14px;background:linear-gradient(135deg,#ff9a52,#e85d1a);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
  .obtn:hover{filter:brightness(1.06)}
  .gbtn{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e9ddd2;border-radius:12px;padding:11px 15px;font-size:13.5px;font-weight:600;cursor:pointer}

  textarea.inp{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;min-height:104px;resize:vertical;line-height:1.5}

  @media(max-width:720px){ aside.sidebar{width:62px} header.top,main.content{padding-left:14px;padding-right:14px} }

<body>
<div class="app">

      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2.5l2.4 5.1 5.6.7-4.1 3.9 1.1 5.6L12 21l-5 2.8 1.1-5.6L4 14.3l5.6-.7z" stroke="#062a17" stroke-width="1.6" fill="#0b3d24"/></svg>
    </div>
    <button class="navbtn on" data-sec="overview" title="Обзор"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 10.5L12 3l9 7.5M5 9v11h5v-6h4v6h5V9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></button>

    <button class="navbtn" data-sec="recon" title="Сверка с банком"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 21V9l8-5 8 5v12M9 21v-6h6v6" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></button>
    <button class="navbtn" data-sec="cfo" title="Где деньги"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>

  <div class="mainwrap">

          <div id="chipName" style="font-size:13.5px;font-weight:700">Салон «Lalivu»</div>

<script>
/* ===================== данные/справочники ===================== */
const DEF_ACCOUNTS=["Терминал","Наличные","Карта"];
const DEF_INCOME=["Услуги салона","Розница (косметика)","Абонементы","Инвестиции","Без статьи"];
const DEF_EXPENSE=["ЗП мастеров","Аренда","Материалы (косметика)","Маркетинг","ЗП Бухгалтер","ЗП Админов","Налоги","Расходники","Мелкие расходы","Без статьи"];
const CUR={RUB:"₽",USD:"$",EUR:"€",ARS:"$"};
const CUR_BTNS=[["RUB","₽"],["USD","$"],["EUR","€"]];
const PERIOD_BTNS=[["12","1 год"],["6","6 мес"],["3","3 мес"],["month","Текущий"]];
const INC_PAL=["#46e08a","#34b977","#2a8f5e","#1f6646","#3fc98e","#5bd6a4","#7184a0"];
const EXP_PAL=["#ff9a52","#f07a35","#e05f3a","#c94e4e","#a8553a","#7a4a33","#9b6b4a","#c98a4e","#8a7d72"];

let ACCOUNTS=DEF_ACCOUNTS.slice(), INCOME=DEF_INCOME.slice(), EXPENSE=DEF_EXPENSE.slice();

let state={settings:{salonName:"Lalivu Space",currency:"RUB",
  accounts:DEF_ACCOUNTS.slice(),incomeCats:DEF_INCOME.slice(),expenseCats:DEF_EXPENSE.slice(),
  openings:{"Терминал":0,"Наличные":2700,"Карта":-501},
  avgCheck:0,clients:0,taxRate:6}, tx:[], reports:[], bank:[]};
let range="6", curOp='income', curLayout=1, curSec='overview', searchQuery='';

/* ===================== хранилище: Supabase → облако → localStorage ===================== */
let sb=null, sbUser=null;
const hasCloud=(typeof window!=='undefined' && window.storage);
const SB_DEFAULT={url:"https://fkwqqpwbossecszebijy.supabase.co",key:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrd3FxcHdib3NzZWNzemViaWp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTA1MzIsImV4cCI6MjA5NzYyNjUzMn0.HHd7YQbtlCGH70UI3UJYGYJwONX1iHH9IjtmKd64af4"};
function sbReady(){return !!(sb&&sbUser);}
function localGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function localSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function sbCfg(){try{const c=JSON.parse(localStorage.getItem('salon2:sbcfg')||'null'); if(c&&c.url&&c.key)return c;}catch(e){} return (SB_DEFAULT.url&&SB_DEFAULT.key)?SB_DEFAULT:null;}
function initSb(){const c=sbCfg(); if(c&&c.url&&c.key&&typeof supabase!=='undefined'){try{sb=supabase.createClient(c.url,c.key);}catch(e){sb=null;}}}
const store={
  async get(k){
    if(sbReady()){try{const {data,error}=await sb.from('salon_kv').select('v').eq('k',k).maybeSingle(); if(error)throw error; return data?data.v:null;}catch(e){return localGet(k);}}
    if(hasCloud){try{const r=await window.storage.get(k); return r&&r.value?r.value:null;}catch(e){return null;}}
    return localGet(k);
  },
  async set(k,v){
    if(sbReady()){try{const {error}=await sb.from('salon_kv').upsert({user_id:sbUser.id,k,v,updated_at:new Date().toISOString()}); if(error)throw error; return;}catch(e){localSet(k,v); return;}}
    if(hasCloud){try{await window.storage.set(k,v);}catch(e){} return;}
    localSet(k,v);
  }
};
function syncRefs(){
  const s=state.settings;
  if(!Array.isArray(s.accounts)||!s.accounts.length)s.accounts=DEF_ACCOUNTS.slice();
  if(!Array.isArray(s.incomeCats)||!s.incomeCats.length)s.incomeCats=DEF_INCOME.slice();
  if(!Array.isArray(s.expenseCats)||!s.expenseCats.length)s.expenseCats=DEF_EXPENSE.slice();
  if(!s.openings)s.openings={};
  if(s.avgCheck==null)s.avgCheck=0; if(s.clients==null)s.clients=0; if(s.taxRate==null)s.taxRate=6;
  ACCOUNTS=s.accounts; INCOME=s.incomeCats; EXPENSE=s.expenseCats;
}
async function load(){
  for(const k of [["settings","salon2:settings"],["tx","salon2:tx"],["reports","salon2:reports"],["bank","salon2:bank"]]){
    const v=await store.get(k[1]); if(v){try{state[k[0]]=JSON.parse(v);}catch(e){}}
  }
  syncRefs();
}
let st;
function save(){clearTimeout(st); st=setTimeout(async()=>{
  await store.set('salon2:settings',JSON.stringify(state.settings));
  await store.set('salon2:tx',JSON.stringify(state.tx));
  await store.set('salon2:reports',JSON.stringify(state.reports));
  await store.set('salon2:bank',JSON.stringify(state.bank));
},250);}

/* ===================== helpers ===================== */
const sym=()=>CUR[state.settings.currency]||"₽";
function money(n){const v=Math.round(n||0); return (v<0?"−":"")+new Intl.NumberFormat('ru-RU').format(Math.abs(v))+" "+sym();}
function moneyK(n){const a=Math.abs(n); if(a>=1e6)return (n/1e6).toFixed(1).replace('.0','')+"M"; if(a>=1e3)return Math.round(n/1e3)+"К"; return Math.round(n);}
function pct(n){return (n*100).toFixed(n*100<10&&n!==0?1:0)+"%";}
function ym(d){return (d||"").slice(0,7);}
function uid(p){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function parseDate(s){s=(s||"").trim(); let m=s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4}|\d{2})(?!\d)/); if(m){let y=m[3].length===2?('20'+m[3]):m[3]; return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;} m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`; return null;}
function cleanNum(s){if(s==null)return NaN; s=String(s).replace(/ /g,'').replace(/\s/g,''); let neg=/^\(.*\)$/.test(s)||/-/.test(s); s=s.replace(/[^\d.,]/g,''); if(s.includes('.')&&s.includes(',')){s=s.replace(/\./g,'').replace(',','.');}else if(s.includes(',')){s=/,\d{1,2}$/.test(s)?s.replace(',','.'):s.replace(/,/g,'');} const n=parseFloat(s); if(isNaN(n))return NaN; return neg?-n:n;}
function nowYM(){return new Date().toISOString().slice(0,7);}
function monthsBack(n){const arr=[]; const d=new Date(); const y=d.getUTCFullYear(), mo=d.getUTCMonth(); for(let i=n-1;i>=0;i--){arr.push(new Date(Date.UTC(y,mo-i,1)).toISOString().slice(0,7));} return arr;}
function monthLabel(p){const[y,m]=p.split('-'); const n=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"]; return n[+m-1]+" "+y.slice(2);}
function monthShort(p){const[y,m]=p.split('-'); const n=["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"]; return n[+m-1];}
function isPayroll(c){return /^ЗП/i.test(c);}
function periodMonths(){ if(range==="month")return [nowYM()]; return monthsBack(+range); }
function periodLabel(){const o={"12":"12 мес","6":"6 мес","3":"3 мес","month":"текущий месяц"}; return o[range]||range;}

/* ===================== метрики ===================== */
function metrics(months){
  months=months||periodMonths();
  const tx=state.tx.filter(t=>months.includes(ym(t.date)));
  const inc=tx.filter(t=>t.type==='income'), exp=tx.filter(t=>t.type==='expense');
  const rev=inc.reduce((a,t)=>a+t.amount,0), spend=exp.reduce((a,t)=>a+t.amount,0);
  const net=rev-spend;
  const byInc={}, byExp={}, byStaff={};
  inc.forEach(t=>byInc[t.cat]=(byInc[t.cat]||0)+t.amount);
  exp.forEach(t=>{byExp[t.cat]=(byExp[t.cat]||0)+t.amount; if(isPayroll(t.cat))byStaff[t.cat]=(byStaff[t.cat]||0)+t.amount;});
  const fot=Object.values(byStaff).reduce((a,b)=>a+b,0);
  return {tx,inc,exp,rev,spend,net,byInc,byExp,byStaff,fot};
}
function monthMetric(m){const t=state.tx.filter(x=>ym(x.date)===m); const rev=t.filter(x=>x.type==='income').reduce((a,x)=>a+x.amount,0); const exp=t.filter(x=>x.type==='expense').reduce((a,x)=>a+x.amount,0); return {rev,exp,net:rev-exp};}
function accountBalances(){
  const bal={}; ACCOUNTS.forEach(a=>bal[a]=(state.settings.openings&&state.settings.openings[a])||0);
  state.tx.forEach(t=>{
    if(t.type==='income') bal[t.account]=(bal[t.account]||0)+t.amount;
    else if(t.type==='expense') bal[t.account]=(bal[t.account]||0)-t.amount;
    else if(t.type==='transfer'){ bal[t.from]=(bal[t.from]||0)-t.amount; bal[t.to]=(bal[t.to]||0)+t.amount; }
  });
  return bal;
}
function totalBalance(){const b=accountBalances(); return Object.values(b).reduce((a,x)=>a+x,0);}
function cumulativeByMonth(months){
  const open=Object.values(state.settings.openings||{}).reduce((a,x)=>a+x,0);
  const flowByMonth={};
  state.tx.forEach(t=>{const m=ym(t.date); let d=0; if(t.type==='income')d=t.amount; else if(t.type==='expense')d=-t.amount; flowByMonth[m]=(flowByMonth[m]||0)+d;});
  const allMonths=[...new Set(state.tx.map(t=>ym(t.date)))].sort();
  const cum={}; let r=open;
  allMonths.forEach(m=>{r+=flowByMonth[m]||0; cum[m]=r;});
  return months.map(m=>{const ks=allMonths.filter(x=>x<=m); return {m, v: ks.length?cum[ks[ks.length-1]]:open};});
}
function trendPct(curr,prev){ if(!prev)return null; return (curr-prev)/Math.abs(prev)*100; }
function trendBadge(curr,prev,goodUp){
  const t=trendPct(curr,prev); if(t==null||!isFinite(t))return '';
  const up=t>=0; const good=goodUp?up:!up;
  const col=good?'#46e08a':'#ff8a5c'; const bg=good?'rgba(70,224,138,.13)':'rgba(255,138,92,.13)';
  return `<span style="display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:12px;font-weight:700;color:${col};background:${bg};padding:3px 9px;border-radius:8px">${up?'↑':'↓'} ${Math.abs(t).toFixed(1).replace('.0','')} %</span>`;
}

/* ===================== сверка ===================== */
function reconcile(){
  const months=periodMonths();
  const reps=state.reports.filter(r=>months.includes(ym(r.date)));
  let expected=[];
  reps.forEach(r=>{ if(r.card>0)expected.push({date:r.date,ch:'Безнал',amount:r.card,who:r.who,used:false});
                    if(r.cash>0)expected.push({date:r.date,ch:'Наличные',amount:r.cash,who:r.who,used:false}); });
  let credits=state.bank.filter(b=>months.includes(ym(b.date))&&b.amount>0).map(b=>({...b,used:false}));
  const matches=[];
  function match(exp,feeLow){let best=-1,bd=Infinity;
    credits.forEach((c,i)=>{if(c.used)return; const dd=(new Date(c.date)-new Date(exp.date))/86400000; if(dd<-1||dd>5)return; if(c.amount>exp.amount*1.01)return; if(c.amount<exp.amount*(1-feeLow))return; const diff=Math.abs(exp.amount-c.amount); if(diff<bd){bd=diff;best=i;}});
    if(best>=0){credits[best].used=true;exp.used=true;matches.push({exp,credit:credits[best],fee:exp.amount-credits[best].amount});}}
  expected.filter(e=>e.ch==='Безнал').forEach(e=>match(e,0.06));
  expected.filter(e=>e.ch==='Наличные').forEach(e=>match(e,0.02));
  const missExp=expected.filter(e=>!e.used);
  const extraCred=credits.filter(c=>!c.used);
  const declared=expected.reduce((a,e)=>a+e.amount,0);
  const arrived=matches.reduce((a,x)=>a+x.credit.amount,0);
  const missSum=missExp.reduce((a,e)=>a+e.amount,0);
  const fee=matches.reduce((a,x)=>a+x.fee,0);
  return {expected,matches,missExp,extraCred,declared,arrived,missSum,fee,hasData:reps.length||credits.length};
}

/* ===================== общие билдеры графиков ===================== */
function buildPath(vals,w,h){
  const min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1, n=vals.length;
  const pts=vals.map((v,i)=>{const x=n>1?(i/(n-1))*w:w/2; const y=h-((v-min)/rng)*(h*0.74)-h*0.13; return [x,y];});
  let d='M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
  for(let i=1;i<pts.length;i++)d+=' L'+pts[i][0].toFixed(1)+' '+pts[i][1].toFixed(1);
  return {line:d, area:d+' L'+w+' '+h+' L0 '+h+' Z', pts, max, min};
}
function capChartHTML(months,sfx,hgt){
  const data=cumulativeByMonth(months);
  if(data.every(d=>d.v===0)) return `<div style="height:${hgt||200}px;display:flex;align-items:center;justify-content:center;color:#6f6359;font-size:13.5px">Нет данных. Загрузите операции.</div>`;
  const vals=data.map(d=>d.v); const cap=buildPath(vals,600,200);
  const mIdx=vals.indexOf(cap.max);
  const markerLeft=vals.length>1?(mIdx/(vals.length-1))*100:50;
  const markerTop=(cap.pts[mIdx][1]/200)*100;
  const span=(cap.max-cap.min)||1; const yvals=[cap.max,cap.min+span*0.75,cap.min+span*0.5,cap.min+span*0.25,cap.min];
  const yLabels=yvals.map(v=>moneyK(v)).map(s=>`<span>${s}</span>`).join('');
  const xLabels=data.map(d=>`<span>${monthShort(d.m)}</span>`).join('');

      <path d="${cap.area}" fill="url(#cap${sfx})"/><path d="${cap.line}" fill="none" stroke="#ffd9bf" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/></svg>
    <div style="position:absolute;left:${markerLeft.toFixed(1)}%;top:${markerTop.toFixed(1)}%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.18);z-index:3"></div>
    <div style="position:absolute;left:0;right:36px;bottom:0;display:flex;justify-content:space-between;font-size:11.5px;color:#8a7d72">${xLabels}</div>

}

function structBars(obj,pal,opts){
  opts=opts||{};

  if(!ent.length)return `<div style="color:#6f6359;font-size:13px;padding:8px 0">Нет данных за период.</div>`;
  const total=ent.reduce((a,e)=>a+e[1],0);
  return ent.map((e,i)=>{const p=Math.round(e[1]/total*100); const col=pal[i%pal.length];
    return `<div style="margin-bottom:13px"><div style="display:flex;align-items:center;font-size:13.5px;margin-bottom:6px">

}

/* ===================== деривативные показатели ===================== */
function derived(m){
  const s=state.settings;
  const rev=m.rev, exp=m.spend, net=m.net;
  const margin=rev?net/rev:0;
  const fotShare=rev?m.fot/rev:0;
  let avgCheck=+s.avgCheck||0, clients=+s.clients||0;
  if(avgCheck>0 && !clients) clients=Math.round(rev/avgCheck);
  else if(clients>0 && !avgCheck) avgCheck=Math.round(rev/clients);
  const taxRate=(+s.taxRate||0)/100;
  const taxes=Math.round(rev*taxRate);
  const pm=periodMonths().length||1;
  const monthlyBurn=exp/pm; const dailyBurn=monthlyBurn/30;
  const bal=totalBalance();
  const runway=dailyBurn>0?Math.round(bal/dailyBurn):null;
  let rent=0; Object.entries(m.byExp).forEach(([k,v])=>{if(/аренд/i.test(k))rent+=v;});
  const rentShare=rev?rent/rev:0;
  return {rev,exp,net,margin,fotShare,avgCheck,clients,taxes,taxRate,runway,bal,rent,rentShare,monthlyBurn};
}

function bindOpsForm(){
  const add=document.getElementById('o_add'); if(!add)return;
  add.onclick=()=>{const amount=cleanNum(document.getElementById('o_amt').value); if(!amount)return;
    const date=document.getElementById('o_date').value, note=(document.getElementById('o_note').value||'').trim();
    if(curOp==='transfer') state.tx.push({id:uid('t'),type:'transfer',date,amount:Math.abs(amount),from:document.getElementById('o_from').value,to:document.getElementById('o_to').value,note});
    else state.tx.push({id:uid('t'),type:curOp,date,amount:Math.abs(amount),cat:document.getElementById('o_cat').value,account:document.getElementById('o_acc').value,note});
    save(); renderAll();};
  const bulkAdd=document.getElementById('bulkAdd');
  if(bulkAdd)bulkAdd.onclick=()=>{const r=parseTxBulk(document.getElementById('bulk').value);save();renderAll();const mm=document.getElementById('bulkMsg'); if(mm)mm.textContent=`Добавлено: ${r.ok}${r.bad?`, не распознано: ${r.bad}`:''}`;};
  const bf=document.getElementById('bulkFile');
  if(bf)bf.onchange=e=>{const f=e.target.files[0]; if(!f)return; const mm=document.getElementById('bulkMsg'); if(mm)mm.textContent='Читаю файл…'; readFileToGrid(f,(grid,err)=>{ if(err||!grid){if(mm)mm.textContent=err||'Не удалось прочитать файл.';return;} if(mm)mm.textContent=''; startMapping(grid);}); e.target.value='';};
  const demo=document.getElementById('demoBtn'); if(demo)demo.onclick=()=>{seedDemo();};
  const wipe=document.getElementById('wipeBtn'); if(wipe)wipe.onclick=()=>{if(confirm('Удалить все операции, отчёты и выписку, обнулить остатки? Необратимо.')){state.tx=[];state.reports=[];state.bank=[];ACCOUNTS.forEach(a=>state.settings.openings[a]=0);save();renderAll();}};
}

function renderCfo(){
  const m=metrics(); const d=derived(m); const r=reconcile();
  const checks=[
    {label:'Маржа чистой прибыли',val:m.rev?pct(d.margin):'—',norm:'≥ 20%',ok:d.margin>=0.2},
    {label:'Доля ФОТ в выручке',val:m.rev?pct(d.fotShare):'—',norm:'≤ 45%',ok:m.fot>0?d.fotShare<=0.45:true},
    {label:'Доля аренды',val:d.rent>0?pct(d.rentShare):'—',norm:'≤ 20%',ok:d.rent>0?d.rentShare<=0.2:true},
    {label:'Запас прочности (касса)',val:d.runway!=null?d.runway+' дн.':'—',norm:'≥ 30 дн.',ok:d.runway==null?true:d.runway>=30},
    {label:'Расхождение с банком',val:r.hasData?money(r.missSum):'—',norm:'= 0',ok:!r.hasData||r.missSum===0},
  ].map(c=>({...c,color:c.ok?'#46e08a':'#ff6b5e',bg:c.ok?'rgba(70,224,138,.14)':'rgba(255,107,94,.14)',icon:c.ok?'✓':'!'}));
  const allOk=checks.every(c=>c.ok);
  const verdict = m.net<0 ? 'Период в минусе — расходы выше доходов' : allOk ? 'Бизнес здоров: прибыль положительная, нормативы в норме' : 'Прибыль есть, но часть нормативов вне нормы — смотри проверку';
  const vColor = m.net<0?'linear-gradient(135deg,#e0432f,#9a2a1e 45%,#3a140e)':allOk?'linear-gradient(135deg,#1f8f56 0%,#13724a 45%,#0e3a28 100%)':'linear-gradient(135deg,#c47a32 0%,#9a5d2a 45%,#3a2415 100%)';

async function sbLogin(email,pw,signup){if(!sb)return;const mm=document.getElementById('db_msg');try{const res=signup?await sb.auth.signUp({email,password:pw}):await sb.auth.signInWithPassword({email,password:pw});if(res.error)throw res.error;sbUser=(res.data&&res.data.user)||null;if(signup&&!(res.data&&res.data.session)){if(mm)mm.textContent='Аккаунт создан. Подтверди e-mail (или отключи подтверждение в Supabase), затем войди.';sbUser=null;renderDb();return;}await pullFromDb(false);renderAll();}catch(e){if(mm)mm.textContent='Ошибка: '+(e.message||e);}}
async function pullFromDb(force){let any=false;for(const k of [["settings","salon2:settings"],["tx","salon2:tx"],["reports","salon2:reports"],["bank","salon2:bank"]]){const v=await store.get(k[1]);if(v){try{state[k[0]]=JSON.parse(v);any=true;}catch(e){}}}if(any){syncRefs();renderAll();}else{save();}}
async function sbLogout(){if(sb){try{await sb.auth.signOut();}catch(e){}}sbUser=null;renderAll();}

/* ===================== parsers ===================== */
function parseTxBulk(text){let ok=0,bad=0; text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(l=>{
  const p=l.split(/[;\t]/).map(x=>x.trim()); const date=parseDate(p[0]); const typ=(p[1]||'').toLowerCase(); const amount=cleanNum(p[2]);
  if(!date||!amount){bad++;return;}
  if(typ.startsWith('дох')||typ.startsWith('пост')){const cat=INCOME.find(c=>c.toLowerCase()===(p[3]||'').toLowerCase())||p[3]||'Без статьи'; const acc=ACCOUNTS.find(a=>a.toLowerCase()===(p[4]||'').toLowerCase())||p[4]||ACCOUNTS[0]; state.tx.push({id:uid('t'),type:'income',date,amount:Math.abs(amount),cat,account:acc,note:p[5]||''}); ok++;}
  else if(typ.startsWith('рас')){const cat=EXPENSE.find(c=>c.toLowerCase()===(p[3]||'').toLowerCase())||p[3]||'Без статьи'; const acc=ACCOUNTS.find(a=>a.toLowerCase()===(p[4]||'').toLowerCase())||p[4]||ACCOUNTS[0]; state.tx.push({id:uid('t'),type:'expense',date,amount:Math.abs(amount),cat,account:acc,note:p[5]||''}); ok++;}
  else if(typ.startsWith('пер')||typ.startsWith('инк')){state.tx.push({id:uid('t'),type:'transfer',date,amount:Math.abs(amount),from:p[4]||ACCOUNTS[1],to:p[3]||ACCOUNTS[0],note:p[5]||''}); ok++;}
  else bad++;
}); return {ok,bad};}
function parseReports(text){let ok=0,bad=0; text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(l=>{
  const p=l.split(/[;\t]/).map(x=>x.trim()); const date=parseDate(p[0]); if(!date){bad++;return;}
  const cash=cleanNum(p[1])||0, card=cleanNum(p[2])||0; if(!cash&&!card){bad++;return;}
  state.reports.push({id:uid('r'),date,cash:Math.abs(cash),card:Math.abs(card),who:p[3]||''}); ok++;}); return {ok,bad};}
function parseBank(text){let ok=0,bad=0; text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(l=>{
  const p=l.split(/[;\t]/).map(x=>x.trim()); const di=p.findIndex(x=>parseDate(x)); if(di<0){bad++;return;}
  const date=parseDate(p[di]); const rest=p.filter((_,i)=>i!==di); const nums=rest.map(cleanNum).filter(v=>!isNaN(v)&&v!==0);
  let amount; if(nums.length===1)amount=nums[0]; else if(nums.length>=2)amount=nums[0]-nums[1]; else {bad++;return;}
  const desc=rest.filter(x=>isNaN(cleanNum(x))).join(' ').slice(0,40);
  state.bank.push({id:uid('b'),date,amount,desc}); ok++;}); return {ok,bad};}

/* ===================== импорт Excel/CSV с маппингом ===================== */
let importGrid=null;
function splitLine(line){const d=line.includes(';')?';':(line.includes('\t')?'\t':','); return line.split(d).map(x=>x.trim().replace(/^"|"$/g,''));}
function gridFromRows(rows){
  rows=(rows||[]).filter(r=>r&&r.some(c=>String(c).trim()!=='')); if(!rows.length)return {headers:[],rows:[]};
  const first=rows[0].map(x=>String(x)); const firstHasDate=first.some(x=>parseDate(x));
  let headers,body;
  if(firstHasDate){headers=first.map((_,i)=>'Колонка '+(i+1)); body=rows;}
  else {headers=first.map((x,i)=>String(x||'').trim()||('Колонка '+(i+1))); body=rows.slice(1);}
  const w=Math.max(headers.length,...body.map(r=>r.length));
  while(headers.length<w)headers.push('Колонка '+(headers.length+1));
  return {headers, rows:body.map(r=>{const a=r.map(x=>String(x==null?'':x).trim()); while(a.length<w)a.push(''); return a;})};
}
function readFileToGrid(file,cb){
  const name=(file.name||'').toLowerCase();
  if((name.endsWith('.xlsx')||name.endsWith('.xls'))&&typeof XLSX!=='undefined'){
    const rd=new FileReader();
    rd.onload=()=>{try{const wb=XLSX.read(new Uint8Array(rd.result),{type:'array',cellDates:true,dateNF:'yyyy-mm-dd'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:'yyyy-mm-dd',defval:''});cb(gridFromRows(rows));}catch(e){cb(null,'Не удалось прочитать Excel: '+(e.message||e));}};
    rd.readAsArrayBuffer(file);
  } else { const rd=new FileReader(); rd.onload=()=>{const rows=String(rd.result).split(/\r?\n/).map(splitLine); cb(gridFromRows(rows));}; rd.readAsText(file); }
}
function fileToTextarea(id){return e=>{const f=e.target.files[0]; if(!f)return; const nm=(f.name||'').toLowerCase();
  if((nm.endsWith('.xlsx')||nm.endsWith('.xls'))&&typeof XLSX!=='undefined'){const rd=new FileReader();rd.onload=()=>{try{const wb=XLSX.read(new Uint8Array(rd.result),{type:'array',cellDates:true,dateNF:'yyyy-mm-dd'});const csv=XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]],{FS:';'});const el=document.getElementById(id);if(el)el.value=csv;}catch(err){}};rd.readAsArrayBuffer(f);}
  else {const rd=new FileReader();rd.onload=()=>{const el=document.getElementById(id);if(el)el.value=rd.result;};rd.readAsText(f);} e.target.value='';};}
function guessCol(headers,rows,words,test){
  const lc=headers.map(h=>h.toLowerCase());
  for(let i=0;i<lc.length;i++)if(words.some(w=>lc[i].includes(w)))return i;
  if(test){let best=-1,score=0;for(let c=0;c<headers.length;c++){let s=0;for(const r of rows.slice(0,20))if(test(r[c]))s++;if(s>score){score=s;best=c;}}if(score>=Math.min(3,rows.length))return best;}
  return -1;
}
function startMapping(grid){
  importGrid=grid; const box=document.getElementById('mapBox'); if(!box)return; box.style.display='block';
  if(!grid.rows.length){box.innerHTML='<div class="msg">В файле не нашлось строк с данными.</div>';return;}
  const H=grid.headers,R=grid.rows;
  const gDate=guessCol(H,R,['дат','date'],x=>!!parseDate(x));
  const gType=guessCol(H,R,['тип','операц','type','назнач'],null);
  const gAmt=guessCol(H,R,['сумм','amount','оборот','итого'],x=>{const n=cleanNum(x);return !isNaN(n)&&n!==0&&!parseDate(x);});
  const gInc=guessCol(H,R,['приход','поступл','доход','кредит','credit'],null);
  const gExp=guessCol(H,R,['расход','списан','дебет','debit'],null);
  const gCat=guessCol(H,R,['стат','катег','category','назнач'],null);
  const gAcc=guessCol(H,R,['счет','счёт','account','карта','карт','терминал'],null);
  const gNote=guessCol(H,R,['коммент','опис','note','примеч','контрагент','контакт'],null);
  const hasTwo=gInc>=0&&gExp>=0;
  const opts=(sel)=>H.map((h,i)=>`<option value="${i}" ${i===sel?'selected':''}>${esc(h)}</option>`).join('');
  const optsN=(sel)=>`<option value="-1">— нет —</option>`+H.map((h,i)=>`<option value="${i}" ${i===sel?'selected':''}>${esc(h)}</option>`).join('');
  box.innerHTML=`<div class="msg" style="margin-bottom:10px"><b style="color:#f4ede7">Файл прочитан: ${R.length} строк.</b> Проверь, где что лежит:</div>
    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-bottom:10px">
      <div><label class="msg" style="font-weight:600">Дата</label><select id="m_date" class="inp" style="margin-top:6px">${opts(gDate>=0?gDate:0)}</select></div>
      <div><label class="msg" style="font-weight:600">Доход/расход определять</label><select id="m_mode" class="inp" style="margin-top:6px">
        <option value="two" ${hasTwo?'selected':''}>по колонкам приход/расход</option>
        <option value="col" ${!hasTwo&&gType>=0?'selected':''}>по колонке типа</option>
        <option value="sign" ${!hasTwo&&gType<0?'selected':''}>по знаку суммы (+/−)</option></select></div></div>
    <div id="m_modeRow" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
      <div><label class="msg" style="font-weight:600">Статья</label><select id="m_cat" class="inp" style="margin-top:6px">${optsN(gCat)}</select></div>
      <div><label class="msg" style="font-weight:600">Счёт</label><select id="m_acc" class="inp" style="margin-top:6px">${optsN(gAcc)}</select></div>
      <div><label class="msg" style="font-weight:600">Комментарий</label><select id="m_note" class="inp" style="margin-top:6px">${optsN(gNote)}</select></div></div>
    <div id="m_preview" class="msg"></div>
    <div style="display:flex;gap:10px;margin-top:12px;align-items:center"><button class="obtn" id="m_import" style="padding:11px 18px">Импортировать</button><button class="gbtn" id="m_cancel">Отмена</button></div>`;
  function modeRow(){const mode=document.getElementById('m_mode').value;const row=document.getElementById('m_modeRow');
    if(mode==='two')row.innerHTML=`<div><label class="msg" style="font-weight:600">Колонка «приход»</label><select id="m_inc" class="inp" style="margin-top:6px">${optsN(gInc)}</select></div><div><label class="msg" style="font-weight:600">Колонка «расход»</label><select id="m_exp" class="inp" style="margin-top:6px">${optsN(gExp)}</select></div>`;
    else if(mode==='col')row.innerHTML=`<div><label class="msg" style="font-weight:600">Сумма</label><select id="m_amt" class="inp" style="margin-top:6px">${opts(gAmt>=0?gAmt:0)}</select></div><div><label class="msg" style="font-weight:600">Колонка типа</label><select id="m_type" class="inp" style="margin-top:6px">${optsN(gType)}</select></div>`;
    else row.innerHTML=`<div><label class="msg" style="font-weight:600">Сумма (со знаком)</label><select id="m_amt" class="inp" style="margin-top:6px">${opts(gAmt>=0?gAmt:0)}</select></div>`;
    refreshPreview();}
  function buildOps(){const g=importGrid;const val=id=>{const el=document.getElementById(id);return el?+el.value:-1;};
    const mode=document.getElementById('m_mode').value;const dc=val('m_date'),cc=val('m_cat'),ac=val('m_acc'),nc=val('m_note');
    const ops=[];let bad=0;
    g.rows.forEach(r=>{const date=parseDate(r[dc]);if(!date){bad++;return;}
      let type,amount;
      if(mode==='two'){const ic=val('m_inc'),ec=val('m_exp');const inA=ic>=0?cleanNum(r[ic]):NaN,exA=ec>=0?cleanNum(r[ec]):NaN;
        if(!isNaN(inA)&&inA!==0){type='income';amount=Math.abs(inA);}else if(!isNaN(exA)&&exA!==0){type='expense';amount=Math.abs(exA);}else{bad++;return;}}
      else {const amc=val('m_amt');let a=cleanNum(r[amc]);if(isNaN(a)||a===0){bad++;return;}
        if(mode==='sign'){type=a>=0?'income':'expense';amount=Math.abs(a);}
        else {const tc=val('m_type');const t=(tc>=0?String(r[tc]):'').toLowerCase();type=(/^(дох|пост|приход|кредит|credit|\+)/.test(t))?'income':(/^(рас|спис|дебет|debit|\-)/.test(t)?'expense':(a>=0?'income':'expense'));amount=Math.abs(a);}}
      const cat=cc>=0?(r[cc]||'').trim():''; const acc=ac>=0?(r[ac]||'').trim():''; const note=nc>=0?(r[nc]||'').trim():'';
      ops.push({type,date,amount,cat:cat||'Без статьи',account:acc||ACCOUNTS[0],note});});
    return {ops,bad};}
  function refreshPreview(){const {ops,bad}=buildOps();const pv=document.getElementById('m_preview');
    const inc=ops.filter(o=>o.type==='income').reduce((a,o)=>a+o.amount,0),exp=ops.filter(o=>o.type==='expense').reduce((a,o)=>a+o.amount,0);
    pv.innerHTML=`Распознано <b style="color:#f4ede7">${ops.length}</b> операций${bad?` · пропущено ${bad}`:''}. Доход ${money(inc)} · расход ${money(exp)}.`;
    document.getElementById('m_import').textContent='Импортировать '+ops.length+' операций';}
  document.getElementById('m_mode').onchange=modeRow;
  ['m_date','m_cat','m_acc','m_note'].forEach(id=>{const el=document.getElementById(id);if(el)el.onchange=refreshPreview;});
  document.getElementById('m_modeRow').addEventListener('change',refreshPreview);
  document.getElementById('m_cancel').onclick=()=>{box.style.display='none';box.innerHTML='';importGrid=null;};
  document.getElementById('m_import').onclick=()=>{const {ops}=buildOps();
    ops.forEach(o=>{ if(o.type==='income'){if(!INCOME.includes(o.cat))state.settings.incomeCats.push(o.cat);} else {if(!EXPENSE.includes(o.cat))state.settings.expenseCats.push(o.cat);} if(!ACCOUNTS.includes(o.account)){state.settings.accounts.push(o.account);state.settings.openings[o.account]=0;} state.tx.push({id:uid('t'),type:o.type,date:o.date,amount:o.amount,cat:o.cat,account:o.account,note:o.note});});
    syncRefs();save();renderAll();
    box.style.display='none';box.innerHTML='';importGrid=null;
    const mm=document.getElementById('bulkMsg'); if(mm)mm.textContent='Импортировано '+ops.length+' операций из файла.';};
  modeRow();
}

function download(name,text,mime){const blob=new Blob([text],{type:mime||'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},120);}

function showSec(sec){

  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.id==='view-'+sec));

/* ===================== bind ===================== */
function bind(){
  document.querySelector('.sidebar').addEventListener('click',e=>{const btn=e.target.closest('.navbtn'); if(btn&&btn.dataset.sec)showSec(btn.dataset.sec);});
  document.getElementById('periodSwitch').addEventListener('click',e=>{const b=e.target.closest('button'); if(b&&b.dataset.period){range=b.dataset.period;renderAll();}});
  document.getElementById('curSwitch').addEventListener('click',e=>{const b=e.target.closest('button'); if(b&&b.dataset.cur){state.settings.currency=b.dataset.cur;save();renderAll();}});
  const sbx=document.getElementById('searchBox'); if(sbx)sbx.addEventListener('input',e=>{searchQuery=e.target.value;renderOps();});
  document.querySelector('main.content').addEventListener('click',e=>{
    const t=e.target;
    const lay=t.closest('[data-layout]'); if(lay){curLayout=+lay.dataset.layout;renderOverview();return;}
    const go=t.closest('[data-go]'); if(go){showSec(go.dataset.go);return;}
    const op=t.closest('[data-optype]'); if(op){curOp=op.dataset.optype;renderOps();return;}
    const del=t.closest('[data-del]'); if(del){state.tx=state.tx.filter(x=>x.id!==del.dataset.del);save();renderAll();return;}
    const da=t.closest('[data-delacc]'); if(da){if(ACCOUNTS.length<=1)return;const a=da.dataset.delacc;state.settings.accounts=ACCOUNTS.filter(x=>x!==a);delete state.settings.openings[a];syncRefs();save();renderAll();return;}
    const di=t.closest('[data-delinc]'); if(di){state.settings.incomeCats=INCOME.filter(x=>x!==di.dataset.delinc);syncRefs();save();renderAll();return;}
    const de=t.closest('[data-delexp]'); if(de){state.settings.expenseCats=EXPENSE.filter(x=>x!==de.dataset.delexp);syncRefs();save();renderAll();return;}
  });
}
